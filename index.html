<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotomi</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
      }
      #app {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .controls {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      button {
        padding: 0.4rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }

      /* Thin scrollbars for play-info scroll areas.
         On macOS these are overlay scrollbars anyway; on Windows this gives
         a slim 4px track that only appears when content overflows. */
      .play-info-scroll {
        scrollbar-width: thin;           /* Firefox */
        scrollbar-color: rgba(0,0,0,0.25) transparent;
      }
      .play-info-scroll::-webkit-scrollbar {
        height: 4px;
      }
      .play-info-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .play-info-scroll::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.25);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="url-params.js"></script>
    <script src="app.js"></script>
    <script>
      const app = Elm.Main.init({
        node: document.getElementById("app"),
        flags: {
          replayUrl: readReplayUrl(window.location.search),
          sectionIndex: readSectionIndex(window.location.search),
          groupIndex: readGroupIndex(window.location.search),
          flipOpponent: readFlipOpponent(window.location.search),
        },
      });
      app.ports.pushUrl.subscribe(function ({ url, index, groupIndex, flipOpponent }) {
        history.pushState({}, "", buildShareUrl(url, index, groupIndex, flipOpponent) || window.location.pathname);
      });

      var touchStartX = 0;
      var SWIPE_THRESHOLD = 50;
      document.addEventListener("touchstart", function (e) {
        touchStartX = e.changedTouches[0].clientX;
      }, { passive: true });
      document.addEventListener("touchend", function (e) {
        var dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > SWIPE_THRESHOLD) {
          app.ports.onSwipe.send(dx < 0 ? "left" : "right");
        }
      }, { passive: true });
    </script>
  </body>
</html>
