<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotomi</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .controls {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      button {
        padding: 0.4rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="url-params.js"></script>
    <script src="app.js"></script>
    <script>
      const app = Elm.Main.init({
        node: document.getElementById("app"),
        flags: {
          replayUrl: readReplayUrl(window.location.search),
          sectionIndex: readSectionIndex(window.location.search),
        },
      });
      app.ports.pushUrl.subscribe(function ({ url, index }) {
        history.pushState({}, "", buildShareUrl(url, index) || window.location.pathname);
      });
    </script>
  </body>
</html>
